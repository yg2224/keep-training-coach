{% extends "layout.html" %}

{% block content %}
<section class="card">
  <h2>Daily Log</h2>
  <form method="post" action="{{ url_for('submit_today_log') }}" class="stack-form">
    <label>
      Date
      <input type="date" name="log_date" required>
    </label>
    <label>
      Planned workout
      <select name="plan_workout_id">
        <option value="">Standalone log</option>
        {% for workout in workouts %}
        <option value="{{ workout.id }}">{{ workout.plan_date }} · {{ workout.title }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      Completed
      <select name="completed" required>
        <option value="done">done</option>
        <option value="partial">partial</option>
        <option value="skipped">skipped</option>
      </select>
    </label>
    <label>
      Actual distance km
      <input type="text" name="actual_distance_km">
    </label>
    <label>
      Actual duration min
      <input type="text" name="actual_duration_min">
    </label>
    <label>
      Actual pace
      <input type="text" name="actual_pace">
    </label>
    <label>
      Average heartrate
      <input type="text" name="average_heartrate">
    </label>
    <label>
      Fatigue score
      <input type="text" name="fatigue_score">
    </label>
    <label>
      Mood score
      <input type="text" name="mood_score">
    </label>
    <label>
      Notes
      <textarea name="notes" rows="4"></textarea>
    </label>
    <button type="submit">Save Log</button>
  </form>
</section>

<section class="card">
  <h2>Recent Logs</h2>
  {% if recent_logs %}
  <ul>
    {% for log in recent_logs %}
    <li>{{ log.log_date }} · {{ log.title or "Standalone" }} · {{ log.completed }}</li>
    {% endfor %}
  </ul>
  {% else %}
  <p>No logs yet.</p>
  {% endif %}
</section>
{% endblock %}
