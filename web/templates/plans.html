{% extends "layout.html" %}

{% block content %}
<div
  id="plans-job-status"
  class="plan-job-status"
  data-plans-results-url="{{ url_for_lang('plans_results_fragment') }}"
  hidden
></div>
<section class="card">
  <h2>{{ t('plans.generate_title') }}</h2>
  <form
    method="post"
    action="{{ url_for_lang('generate_plan') }}"
    class="stack-form"
    data-plan-type-form
    data-plan-async-form
  >
    <label>
      {{ t('plans.model') }}
      <select name="model_key" required>
        {% for model in models %}
        <option value="{{ model.key }}">{{ model.label }} - {{ model.model }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      {{ t('plans.plan_type') }}
      <select name="plan_type" data-plan-type-select>
        <option value="rolling_week">{{ t('plans.rolling_week') }}</option>
        <option value="race_goal">{{ t('plans.race_goal') }}</option>
      </select>
    </label>
    <p class="plan-type-notice" data-plan-type-notice aria-live="polite"></p>
    <label data-plan-field data-plan-modes="rolling_week">
      {{ t('plans.target_distance') }}
      <input type="text" name="target_distance" placeholder="{{ t('plans.target_distance_placeholder') }}">
    </label>
    <label data-plan-field data-plan-modes="rolling_week">
      {{ t('plans.target_pace') }}
      <input type="text" name="target_pace" placeholder="{{ t('plans.target_pace_placeholder') }}">
    </label>
    <label data-plan-field data-plan-modes="race_goal" hidden>
      {{ t('plans.goal_race_distance') }}
      <input type="text" name="goal_race_distance" placeholder="{{ t('plans.goal_race_distance_placeholder') }}">
    </label>
    <label data-plan-field data-plan-modes="race_goal" hidden>
      {{ t('plans.goal_race_date') }}
      <input type="date" name="goal_race_date" placeholder="{{ t('plans.goal_race_date_placeholder') }}">
    </label>
    <label data-plan-field data-plan-modes="race_goal" hidden>
      {{ t('plans.goal_race_pace') }}
      <input type="text" name="goal_race_pace" placeholder="{{ t('plans.goal_race_pace_placeholder') }}">
    </label>
    <label>
      {{ t('plans.goal_notes') }}
      <textarea name="goal_notes" rows="4" placeholder="{{ t('plans.goal_notes_placeholder') }}"></textarea>
    </label>
    <button
      type="submit"
      data-idle-text="{{ t('plans.generate_button') }}"
      data-busy-text="{{ t('plans.generate_button_busy') }}"
    >{{ t('plans.generate_button') }}</button>
  </form>
</section>

<section class="card">
  <h2>{{ t('plans.regenerate_title') }}</h2>
  <form
    method="post"
    action="{{ url_for_lang('regenerate_plan_route') }}"
    class="stack-form"
    data-plan-type-form
    data-plan-async-form
  >
    <label>
      {{ t('plans.model') }}
      <select name="model_key" required>
        {% for model in models %}
        <option value="{{ model.key }}">{{ model.label }} - {{ model.model }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      {{ t('plans.plan_type') }}
      <select name="plan_type" data-plan-type-select>
        <option value="rolling_week">{{ t('plans.rolling_week') }}</option>
        <option value="race_goal">{{ t('plans.race_goal') }}</option>
      </select>
    </label>
    <p class="plan-type-notice" data-plan-type-notice aria-live="polite"></p>
    <label data-plan-field data-plan-modes="rolling_week">
      {{ t('plans.target_distance') }}
      <input type="text" name="target_distance" placeholder="{{ t('plans.target_distance_placeholder') }}">
    </label>
    <label data-plan-field data-plan-modes="rolling_week">
      {{ t('plans.target_pace') }}
      <input type="text" name="target_pace" placeholder="{{ t('plans.target_pace_placeholder') }}">
    </label>
    <label data-plan-field data-plan-modes="race_goal" hidden>
      {{ t('plans.goal_race_distance') }}
      <input type="text" name="goal_race_distance" placeholder="{{ t('plans.goal_race_distance_placeholder') }}">
    </label>
    <label data-plan-field data-plan-modes="race_goal" hidden>
      {{ t('plans.goal_race_date') }}
      <input type="date" name="goal_race_date" placeholder="{{ t('plans.goal_race_date_placeholder') }}">
    </label>
    <label data-plan-field data-plan-modes="race_goal" hidden>
      {{ t('plans.goal_race_pace') }}
      <input type="text" name="goal_race_pace" placeholder="{{ t('plans.goal_race_pace_placeholder') }}">
    </label>
    <label>
      {{ t('plans.goal_notes') }}
      <textarea name="goal_notes" rows="3" placeholder="{{ t('plans.regenerate_notes_example') }}"></textarea>
    </label>
    <label>
      {{ t('plans.today_override') }}
      <input type="date" name="today" placeholder="{{ t('plans.today_override_placeholder') }}">
    </label>
    <button
      type="submit"
      data-idle-text="{{ t('plans.regenerate_button') }}"
      data-busy-text="{{ t('plans.regenerate_button_busy') }}"
    >{{ t('plans.regenerate_button') }}</button>
  </form>
</section>

{% include "plans_results.html" %}
{% endblock %}
